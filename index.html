<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#d91e35" />
  <title>Pass Note</title>
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-title">Pass<span class="header-title-accent">Note</span></span>
      </div>
      <div class="header-actions">
        <button class="btn-icon-header" id="btnLogout" aria-label="Logout" title="Logout">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M11 11l3-3-3-3M6 8h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn-icon-header" id="btnExport" aria-label="Export">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 7l3 3 3-3M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn-add" id="btnAdd" aria-label="Add entry">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- FILTER TABS -->
  <div class="filter-bar">
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="All">All</button>
      <button class="filter-tab" data-filter="Finance">Finance</button>
      <button class="filter-tab" data-filter="Website">Website</button>
      <button class="filter-tab" data-filter="App">App</button>
      <button class="filter-tab" data-filter="OTT">OTT</button>
      <button class="filter-tab" data-filter="Other">Other</button>
    </div>
  </div>

  <!-- MAIN LIST -->
  <main class="main" id="mainScroll">
    <div class="pw-list" id="pwList"></div>
    <div class="empty-state" id="emptyState">
      <p class="empty-title">No passwords yet</p>
      <p class="empty-desc empty-tap" id="emptyAddBtn">Touch here to add</p>
    </div>
  </main>

  <!-- BOTTOM SEARCH -->
  <div class="search-bar-wrap">
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 17 17" fill="none"><circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M11.5 11.5L15 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off" />
      <button class="search-clear" id="searchClear" style="display:none">✕</button>
    </div>
  </div>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay" style="display:none">
    <div class="login-card">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
          <rect x="10" y="22" width="44" height="32" rx="9" stroke="#d91e35" stroke-width="2.5"/>
          <path d="M22 22V17a10 10 0 0 1 20 0v5" stroke="#d91e35" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="38" r="4" stroke="#d91e35" stroke-width="2.5"/>
          <path d="M32 42v5" stroke="#d91e35" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="login-title">Pass<span class="login-title-accent">Note</span></h1>
      <p class="login-desc">Enter password to continue</p>
      <div class="login-pw-wrap">
        <input type="password" class="login-pw-input" id="loginPwInput" placeholder="Password" autocomplete="off" />
        <button class="login-pw-btn" id="btnLoginSubmit">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="login-error" id="loginError" style="display:none">Wrong password</p>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════
       FORM SHEET (1단계)
  ══════════════════════════════ -->
  <div class="sheet-overlay" id="formOverlay">
    <div class="bottom-sheet" id="formSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span class="sheet-title" id="formTitle">New Entry</span>
        <button class="sheet-close" id="btnCloseForm">✕</button>
      </div>

      <div class="form-body">
        <input type="hidden" id="editId" />
        <input type="hidden" id="editCategory" value="Other" />

        <!-- ① 항목 형태 선택 -->
        <div class="form-field">
          <label class="field-label">Type</label>
          <div class="type-chips" id="typeChips">
            <button class="type-chip" data-cat="Finance">💳 Finance</button>
            <button class="type-chip" data-cat="Website">🌐 Website</button>
            <button class="type-chip" data-cat="App">📱 App</button>
            <button class="type-chip" data-cat="OTT">🎬 OTT</button>
            <button class="type-chip active" data-cat="Other">📁 Other</button>
          </div>
        </div>

        <!-- ② 입력 내용 -->
        <div class="form-field">
          <label class="field-label" for="inputService">Name</label>
          <input type="text" class="field-input" id="inputService"
            placeholder="기억하기 쉬운 이름으로" autocomplete="off" />
        </div>

        <!-- ③ 아이디 -->
        <div class="form-field">
          <label class="field-label" for="inputUsername">ID / Email</label>
          <input type="text" class="field-input" id="inputUsername"
            placeholder="아이디 또는 이메일" autocomplete="off" autocapitalize="none" />
          <div class="id-presets" id="idPresets" style="display:none">
            <button class="id-preset-chip" data-id="sjidok@naver.com">sjidok@naver.com</button>
            <button class="id-preset-chip" data-id="sjidok750@gmail.com">sjidok750@gmail.com</button>
            <button class="id-preset-chip" data-id="sjidok0124@gmail.com">sjidok0124@gmail.com</button>
            <button class="id-preset-chip" data-id="sjidok">sjidok</button>
          </div>
        </div>

        <!-- ④ 비밀번호 -->
        <div class="form-field">
          <label class="field-label" for="inputPassword">Password</label>
          <input type="text" class="field-input pw-field" id="inputPassword"
            placeholder="비밀번호" autocomplete="new-password" autocorrect="off"
            autocapitalize="none" spellcheck="false" />
          <div class="pw-strength-row">
            <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>
            <span class="pw-strength-label" id="pwStrengthLabel"></span>
          </div>
        </div>

        <!-- 사진 첨부 (선택) -->
        <div class="form-field">
          <label class="field-label">Photo <span class="optional">optional</span></label>
          <div class="photo-row">
            <div class="photo-thumb" id="photoThumb">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="15" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 9h3l2-3h10l2 3h3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
              <span>Add</span>
            </div>
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" />
            <button class="photo-del" id="photoRemove" style="display:none">✕ Remove</button>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" id="btnCancel">Cancel</button>
          <button class="btn-save" id="btnSave">Save</button>
        </div>
        <div style="height:calc(12px + env(safe-area-inset-bottom, 0px))"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════
       DETAIL SHEET
  ══════════════════════════════ -->
  <div class="sheet-overlay" id="modalOverlay">
    <div class="bottom-sheet detail-sheet" id="modal">
      <div class="sheet-handle"></div>
      <div class="detail-header">
        <div class="detail-icon" id="modalIcon"></div>
        <div class="detail-info">
          <span class="detail-name" id="modalService"></span>
          <span class="detail-sub" id="modalUrl"></span>
        </div>
        <button class="sheet-close" id="modalClose">✕</button>
      </div>

      <div class="detail-photo-wrap" id="modalPhotoWrap" style="display:none">
        <img class="detail-photo" id="modalPhoto" src="" alt="" />
      </div>

      <div class="detail-body">
        <div class="detail-row">
          <span class="detail-row-label">Password</span>
          <span class="detail-row-value mono coral" id="modalPassword"></span>
          <button class="btn-copy-sm" data-target="password">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="detail-row" id="detailUsernameRow">
          <span class="detail-row-label">ID / Email</span>
          <span class="detail-row-value mono" id="modalUsername"></span>
          <button class="btn-copy-sm" data-target="username">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="detail-row" id="detailNoteRow" style="display:none">
          <span class="detail-row-label">Note</span>
          <span class="detail-row-value" id="modalNote"></span>
        </div>
      </div>

      <div class="detail-footer">
        <button class="btn-detail-edit" id="btnModalEdit">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Edit
        </button>
        <button class="btn-detail-del" id="btnModalDelete">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.7 7.5a1 1 0 0 0 1 .9h4.6a1 1 0 0 0 1-.9L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Delete
        </button>
      </div>
      <div style="height:calc(8px + env(safe-area-inset-bottom, 0px))"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
